securityDefinitions:
  api_key:
    description: "Your CEDAR API key, using the format 'apiKey <yourApiKey>'"
    type: "apiKey"
    name: "Authorization"
    in: "header"
definitions:
  IntegratedRetrieveConstraintAction:
    type: "object"
    required:
    - "action"
    - "source"
    - "termUri"
    - "type"
    properties:
      action:
        type: "string"
        description: "Action to be applied."
      termUri:
        type: "string"
        description: "Term URI the action applies to."
      type:
        type: "string"
        description: "Type of the term."
      source:
        type: "string"
        description: "Source of the term."
  IntegratedRetrieveConstraintBranch:
    type: "object"
    required:
    - "acronym"
    - "uri"
    properties:
      uri:
        type: "string"
        description: "Branch URI."
      acronym:
        type: "string"
        description: "Ontology acronym."
  IntegratedRetrieveConstraintClass:
    type: "object"
    required:
    - "prefLabel"
    - "source"
    - "type"
    - "uri"
    properties:
      uri:
        type: "string"
        description: "Class URI."
      prefLabel:
        type: "string"
        description: "Preferred label of the class."
      type:
        type: "string"
        description: "Type of the class."
      source:
        type: "string"
        description: "Source of the class."
  IntegratedRetrieveConstraintOntology:
    type: "object"
    required:
    - "acronym"
    properties:
      acronym:
        type: "string"
        description: "Ontology acronym."
  IntegratedRetrieveConstraintValueSet:
    type: "object"
    required:
    - "uri"
    - "vsCollection"
    properties:
      uri:
        type: "string"
        description: "Value set URI."
      vsCollection:
        type: "string"
        description: "Value set collection."
  IntegratedRetrieveRequestBody:
    type: "object"
    required:
    - "valueConstraints"
    properties:
      valueConstraints:
        description: "The value constraints field specification. Based on CEDAR's\
          \ '_valueConstraints' field."
        $ref: "#/definitions/IntegratedRetrieveValueConstraints"
      inputText:
        type: "string"
        description: "The user-supplied initial characters used to filter the conforming\
          \ values."
      page:
        type: "integer"
        format: "int32"
        description: "Page to be returned. Example: 7."
      pageSize:
        type: "integer"
        format: "int32"
        description: "Number of results per page. Example: 10."
    description: "Object that encapsulates the information needed to run the integrated-retrieve\
      \ query."
  IntegratedRetrieveResult:
    type: "object"
    required:
    - "@id"
    - "@type"
    - "definition"
    - "id"
    - "notation"
    - "prefLabel"
    - "type"
    properties:
      id:
        type: "string"
        description: "Result identifier."
      '@id':
        type: "string"
        description: "Unique URL identifier of the result."
      '@type':
        type: "string"
        description: "Type of the result."
      type:
        type: "string"
        description: "Type of the result."
      prefLabel:
        type: "string"
        description: "Preferred label of the result."
      notation:
        type: "string"
        description: "Notation of the result."
      definition:
        type: "string"
        description: "Definition of the result."
  IntegratedRetrieveResults:
    type: "object"
    required:
    - "collection"
    - "nextPage"
    - "page"
    - "pageCount"
    - "pageSize"
    - "prevPage"
    - "totalCount"
    properties:
      page:
        type: "integer"
        format: "int32"
        description: "Current page."
      pageCount:
        type: "integer"
        format: "int32"
        description: "Total number of pages."
      pageSize:
