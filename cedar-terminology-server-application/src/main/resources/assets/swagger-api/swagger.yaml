  /bioportal/integrated-retrieve:
    post:
      tags:
      - "Classes"
      - "Value sets"
      - "Values"
      summary: "Retrieve classes and values based on CEDAR value constraints"
      description: "Retrieve ontology classes, value sets, and values based on CEDAR\
        \ value constraints. This endpoint takes a controlled term field specification\
        \ and any user-supplied initial characters and returns conforming values.\
        \ <br /> <br /> Some sample calls in Insomnia (https://insomnia.rest/) format\
        \ are available at https://github.com/metadatacenter/cedar-util/blob/master/api-calls/CEDAR_Insomnia_API_calls.json.\
        \ <br /> <br />Note that in some cases, the server will need to sort the results\
        \ obtained from BioPortal and the original pagination information will not\
        \ be valid any more. In those situations, the values of some of the pagination\
        \ fields returned as part of the results (e.g., pageCount, nextPage, etc.)\
        \ cannot be computed consistently, and the server will assign a 'null' value\
        \ to those fields."
      operationId: "cedarIntegratedRetrieve"
      consumes:
      - "application/json"
      produces:
      - "application/json"
      parameters:
      - in: "body"
        name: "request body"
        description: "Object that encapsulates the information needed to run the search\
          \ query. The \"valueConstraints\" field specification is based on CEDAR's\
          \ \"_valueConstraints\" field. See https://more.metadatacenter.org/tools-training/outreach/cedar-template-model\
          \ for more details."
        required: true
        schema:
          $ref: "#/definitions/IntegratedRetrieveRequestBody"
      responses:
        200:
          description: "A paginated list of search results"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/IntegratedRetrieveResults"
        400:
          description: "Bad request"
        401:
          description: "Unauthorized"
        403:
          description: "Forbidden"
        404:
          description: "Not found"
        500:
          description: "Internal server error"
      security:
      - api_key: []
